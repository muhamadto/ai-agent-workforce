---
# Qwen Code agent configuration management

- name: Ensure ~/.qwen directory exists
  file:
    path: "{{ ansible_facts.env.HOME }}/.qwen"
    state: directory
    mode: '0755'
  when: setup_state == "present"

- name: Deploy Qwen Code settings.json
  copy:
    src: "settings.json"
    dest: "{{ ansible_facts.env.HOME }}/.qwen/settings.json"
    mode: '0644'
  when: setup_state == "present"

- name: Ensure ~/.qwen/agents directory exists
  file:
    path: "{{ ansible_facts.env.HOME }}/.qwen/agents"
    state: directory
    mode: '0755'
  when: setup_state == "present"

- name: Deploy Qwen Code agents
  copy:
    src: "agents/{{ item }}"
    dest: "{{ ansible_facts.env.HOME }}/.qwen/agents/{{ item }}"
    mode: '0644'
  loop:
    - architecture-guardian.md
    - backend-developer.md
    - data-engineer.md
    - frontend-developer.md
    - identity-security-developer.md
    - infrastructure-engineer.md
    - mobile-engineer.md
    - principal-engineer.md
    - secops-engineer.md
  when: setup_state == "present"

- name: Display deployed agents
  debug:
    msg: |
      Qwen Code agents deployed to ~/.qwen/agents/:
      - architecture-guardian: Clean Architecture enforcer (Qwen3-Coder-Next)
      - backend-developer: Java 24+, Spring Boot 4.x, Spring Native expert (Qwen3-Coder-Next)
      - data-engineer: ETL/ELT, big data, data warehousing expert (Qwen3-Coder-Next)
      - frontend-developer: React, Next.js, Flutter expert (Qwen3-Coder-Next)
      - identity-security-developer: OAuth2, OIDC, passkeys expert (Qwen3-Coder-Next)
      - infrastructure-engineer: AWS, GCP, K3S, IaC expert (Qwen3-Coder-Next)
      - mobile-engineer: iOS, Android, Flutter, React Native expert (Qwen3-Coder-Next)
      - principal-engineer: Strategic arbiter and decision-maker (Qwen3-Coder-Next)
      - secops-engineer: OWASP, security tooling expert (Qwen3-Coder-Next)

      Configuration: YOLO mode enabled (auto-approve all tools)
      Usage: Qwen automatically delegates to appropriate subagents
  when: setup_state == "present"

- name: Remove Qwen Code settings.json
  file:
    path: "{{ ansible_facts.env.HOME }}/.qwen/settings.json"
    state: absent
  when: setup_state == "absent"

- name: Remove Qwen Code agents
  file:
    path: "{{ ansible_facts.env.HOME }}/.qwen/agents"
    state: absent
  when: setup_state == "absent"
