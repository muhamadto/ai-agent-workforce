---
# Gemini CLI agent configuration management

- name: Ensure ~/.gemini directory exists
  file:
    path: "{{ ansible_facts.env.HOME }}/.gemini"
    state: directory
    mode: '0755'
  when: setup_state == "present"

- name: Display Gemini placeholder message
  debug:
    msg: |
      Gemini CLI agent role is a placeholder for future implementation.

      Planned features:
        - Gemini CLI configuration
        - Agent definitions
        - Integration with Google AI Studio
        - Model selection (gemini-2.0-flash, gemini-2.0-pro, etc.)
  when: setup_state == "present"

- name: Remove Gemini configuration directory
  file:
    path: "{{ ansible_facts.env.HOME }}/.gemini"
    state: absent
  when: setup_state == "absent"

- name: Display removal message
  debug:
    msg: "Gemini configuration removed from ~/.gemini/"
  when: setup_state == "absent"
