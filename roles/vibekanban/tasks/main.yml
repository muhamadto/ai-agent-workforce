---
# VibeKanban task management tool

- name: Install vibe-kanban globally via npm
  community.general.npm:
    name: vibe-kanban
    global: true
    state: "{{ setup_state }}"

- name: Display VibeKanban installation message
  debug:
    msg: |
      VibeKanban installed globally via npm

      Usage:
        vibe-kanban   # Start local kanban board
  when: setup_state == "present"
