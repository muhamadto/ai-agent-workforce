---
# Claude Code agent configuration management

- name: Ensure ~/.claude directory exists
  file:
    path: "{{ ansible_facts.env.HOME }}/.claude"
    state: directory
    mode: '0700'
  when: setup_state == "present"

- name: Deploy Claude Code settings.json
  copy:
    src: "settings.json"
    dest: "{{ ansible_facts.env.HOME }}/.claude/settings.json"
    mode: '0600'
  when: setup_state == "present"

- name: Ensure ~/.claude/agents directory exists
  file:
    path: "{{ ansible_facts.env.HOME }}/.claude/agents"
    state: directory
    mode: '0700'
  when: setup_state == "present"

- name: Deploy Conventional Commits guide
  copy:
    src: "CONVENTIONAL_COMMITS.md"
    dest: "{{ ansible_facts.env.HOME }}/.claude/CONVENTIONAL_COMMITS.md"
    mode: '0600'
  when: setup_state == "present"

- name: Deploy Git Hooks guide
  copy:
    src: "GIT_HOOKS_GUIDE.md"
    dest: "{{ ansible_facts.env.HOME }}/.claude/GIT_HOOKS_GUIDE.md"
    mode: '0600'
  when: setup_state == "present"

- name: Deploy Shortcut ↔ VibeKanban workflow guide
  copy:
    src: "SHORTCUT_VIBEKANBAN_WORKFLOW.md"
    dest: "{{ ansible_facts.env.HOME }}/.claude/SHORTCUT_VIBEKANBAN_WORKFLOW.md"
    mode: '0600'
  when: setup_state == "present"

- name: Deploy Claude Code agents
  copy:
    src: "agents/{{ item }}"
    dest: "{{ ansible_facts.env.HOME }}/.claude/agents/{{ item }}"
    mode: '0600'
  loop:
    - architecture-guardian.md
    - backend-developer.md
    - data-engineer.md
    - frontend-developer.md
    - identity-security-developer.md
    - infrastructure-engineer.md
    - mobile-engineer.md
    - principal-engineer.md
    - secops-engineer.md
  when: setup_state == "present"

- name: Display deployed agents
  debug:
    msg: |
      Claude Code agents deployed to ~/.claude/agents/:
      - architecture-guardian: Clean Architecture enforcer (Sonnet)
      - backend-developer: Java 24+, Spring Boot 4.x, Spring Native expert (Sonnet)
      - data-engineer: ETL/ELT, big data, data warehousing expert (Sonnet)
      - frontend-developer: React, Next.js, Flutter expert (Sonnet)
      - identity-security-developer: OAuth2, OIDC, passkeys expert (Sonnet)
      - infrastructure-engineer: AWS, GCP, K3S, IaC expert (Sonnet)
      - mobile-engineer: iOS, Android, Flutter, React Native expert (Sonnet)
      - principal-engineer: Strategic arbiter and decision-maker (Sonnet)
      - secops-engineer: OWASP, security tooling expert (Sonnet)

      Usage: Invoke with @agent-name in Claude Code or let Claude choose automatically
  when: setup_state == "present"

- name: Remove Claude Code settings.json
  file:
    path: "{{ ansible_facts.env.HOME }}/.claude/settings.json"
    state: absent
  when: setup_state == "absent"

- name: Remove Claude Code agents
  file:
    path: "{{ ansible_facts.env.HOME }}/.claude/agents"
    state: absent
  when: setup_state == "absent"

- name: Remove Conventional Commits guide
  file:
    path: "{{ ansible_facts.env.HOME }}/.claude/CONVENTIONAL_COMMITS.md"
    state: absent
  when: setup_state == "absent"

- name: Remove Git Hooks guide
  file:
    path: "{{ ansible_facts.env.HOME }}/.claude/GIT_HOOKS_GUIDE.md"
    state: absent
  when: setup_state == "absent"

- name: Remove Shortcut ↔ VibeKanban workflow guide
  file:
    path: "{{ ansible_facts.env.HOME }}/.claude/SHORTCUT_VIBEKANBAN_WORKFLOW.md"
    state: absent
  when: setup_state == "absent"
