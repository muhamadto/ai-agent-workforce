# ── GitHub skill sources ──────────────────────────────────────────────────────

- name: Check if git is available
  command: which git
  register: skills_git_check
  failed_when: false
  changed_when: false
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - github_skill_sources | length > 0

- name: Ensure GitHub skills cache directory exists
  file:
    path: "{{ ansible_facts['user_dir'] }}/.skills/.cache/repos"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - github_skill_sources | length > 0
    - skills_git_check.rc == 0

- name: Clone or update GitHub skill repos
  git:
    repo: "{{ item.repo }}"
    dest: "{{ ansible_facts['user_dir'] }}/.skills/.cache/repos/{{ item.repo | regex_replace('.*/', '') }}"
    version: "{{ item.branch | default('main') }}"
    update: true
    force: false
  loop: "{{ github_skill_sources | selectattr('enabled', 'equalto', true) | list }}"
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - skills_git_check.rc == 0

- name: Find skill directories in GitHub repos
  find:
    paths: >-
      {{ ansible_facts['user_dir'] }}/.skills/.cache/repos/{{
      item.repo | regex_replace('.*/', '') }}/{{
      item.skills_path | default('skills') }}
    file_type: directory
    recurse: false
  loop: "{{ github_skill_sources | selectattr('enabled', 'equalto', true) | list }}"
  register: skills_github_dirs
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - skills_git_check.rc == 0

- name: Sync GitHub skills into ~/.skills/
  synchronize:
    src: "{{ skill_dir.1.path }}/"
    dest: "{{ ansible_facts['user_dir'] }}/.skills/{{ skill_dir.1.path | basename }}/"
    delete: false
    recursive: true
  loop: "{{ skills_github_dirs.results | default([]) | selectattr('files', 'defined') | subelements('files') }}"
  loop_control:
    loop_var: skill_dir
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - skills_git_check.rc == 0
    - >-
      (skill_dir.0.item.selected_skills is not defined) or
      (not skill_dir.0.item.selected_skills) or
      ((skill_dir.1.path | basename) in skill_dir.0.item.selected_skills)

# ── Per-model symlinks ─────────────────────────────────────────────────────────

- name: Stat existing skills paths for all models
  stat:
    path: "{{ ansible_facts['user_dir'] }}/{{ item }}/skills"
  register: skills_stat
  loop:
    - .claude
    - .qwen
    - .gemini
    - .gemini/antigravity
  when: setup_state == "present"

- name: Remove skills path if it is not a symlink pointing to ~/.skills
  file:
    path: "{{ ansible_facts['user_dir'] }}/{{ item.item }}/skills"
    state: absent
  loop: "{{ skills_stat.results | default([]) }}"
  when:
    - setup_state == "present"
    - item.stat is defined
    - item.stat.exists
    - not (item.stat.islnk | default(false) and item.stat.lnk_source | default('') == ansible_facts['user_dir'] + '/.skills')

- name: Ensure ~/.claude exists before creating skills symlink
  file:
    path: "{{ ansible_facts['user_dir'] }}/.claude"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - skills_claude_check.rc == 0

- name: Create skills symlink for Claude
  file:
    src: "{{ ansible_facts['user_dir'] }}/.skills"
    dest: "{{ ansible_facts['user_dir'] }}/.claude/skills"
    state: link
  when:
    - setup_state == "present"
    - skills_claude_check.rc == 0

- name: Ensure ~/.qwen exists before creating skills symlink
  file:
    path: "{{ ansible_facts['user_dir'] }}/.qwen"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - skills_qwen_check.rc == 0

- name: Create skills symlink for Qwen
  file:
    src: "{{ ansible_facts['user_dir'] }}/.skills"
    dest: "{{ ansible_facts['user_dir'] }}/.qwen/skills"
    state: link
  when:
    - setup_state == "present"
    - skills_qwen_check.rc == 0

- name: Ensure ~/.gemini exists before creating skills symlink
  file:
    path: "{{ ansible_facts['user_dir'] }}/.gemini"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - skills_gemini_check.rc == 0

- name: Create skills symlink for Gemini
  file:
    src: "{{ ansible_facts['user_dir'] }}/.skills"
    dest: "{{ ansible_facts['user_dir'] }}/.gemini/skills"
    state: link
  when:
    - setup_state == "present"
    - skills_gemini_check.rc == 0

- name: Ensure ~/.gemini/antigravity exists before creating skills symlink
  file:
    path: "{{ ansible_facts['user_dir'] }}/.gemini/antigravity"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - skills_antigravity_check.rc == 0

- name: Create skills symlink for Antigravity
  file:
    src: "{{ ansible_facts['user_dir'] }}/.skills"
    dest: "{{ ansible_facts['user_dir'] }}/.gemini/antigravity/skills"
    state: link
  when:
    - setup_state == "present"
    - skills_antigravity_check.rc == 0

- name: Display skills installation summary
  debug:
    msg: |
      Skills deployed to ~/.skills/ (central source of truth)

      git-commit — Conventional Commits compliant commits with hook awareness
        ~/.skills/git-commit/SKILL.md

      run-quality-checks — Full pre-commit quality gate (format, lint, test, SAST, SCA)
        ~/.skills/run-quality-checks/SKILL.md

      threat-model — STRIDE threat model for features and architecture changes
        ~/.skills/threat-model/SKILL.md

      api-review — API contract review (OpenAPI/REST/gRPC) for correctness and security
        ~/.skills/api-review/SKILL.md

      test-plan — Structured test plan covering unit, integration, E2E, performance, security
        ~/.skills/test-plan/SKILL.md

      shortcut — Shortcut project management via `short` CLI
        ~/.skills/shortcut/SKILL.md
        ~/.skills/shortcut/reference/shortcut.openapi.json

      shortcut-to-vibe — Import Shortcut stories into VibeKanban
        ~/.skills/shortcut-to-vibe/SKILL.md

      github-issue-to-vibe — Import GitHub issues into VibeKanban
        ~/.skills/github-issue-to-vibe/SKILL.md

      git-branch — Branch lifecycle: cut from origin/main, sync via rebase
        ~/.skills/git-branch/SKILL.md

      adr — Architecture Decision Records
        ~/.skills/adr/SKILL.md

      release-notes — Generate release notes from Conventional Commits history
        ~/.skills/release-notes/SKILL.md

      db-migration-review — Review database migrations for safety and correctness
        ~/.skills/db-migration-review/SKILL.md

      incident — Incident response and blameless postmortem
        ~/.skills/incident/SKILL.md

      dependency-review — Review dependency upgrades for CVEs and breaking changes
        ~/.skills/dependency-review/SKILL.md

      spike — Time-boxed technical investigation with structured report
        ~/.skills/spike/SKILL.md

      Symlinked to:
        ~/.claude/skills  →  ~/.skills  (claude {{ 'installed' if skills_claude_check.rc == 0 else 'not found — skipped' }})
        ~/.qwen/skills    →  ~/.skills  (qwen {{ 'installed' if skills_qwen_check.rc == 0 else 'not found — skipped' }})
        ~/.gemini/skills  →  ~/.skills  (gemini {{ 'installed' if skills_gemini_check.rc == 0 else 'not found — skipped' }})
        ~/.gemini/antigravity/skills → ~/.skills (antigravity {{ 'installed' if skills_antigravity_check.rc == 0 else 'not found — skipped' }})

      Requires: short CLI installed and authenticated (short install)
      Note: OpenAPI spec is bundled — update manually from developer.shortcut.com when the API changes
  when: setup_state == "present"

# ── Removal ────────────────────────────────────────────────────────────────────

- name: Remove skills symlinks from model directories
  file:
    path: "{{ ansible_facts['user_dir'] }}/{{ item }}/skills"
    state: absent
  loop:
    - .claude
    - .qwen
    - .gemini
    - .gemini/antigravity
  when: setup_state == "absent"

- name: Remove GitHub skills cache directory
  file:
    path: "{{ ansible_facts['user_dir'] }}/.skills/.cache"
    state: absent
  when: setup_state == "absent"

- name: Remove central skills directory
  file:
    path: "{{ ansible_facts['user_dir'] }}/.skills"
    state: absent
  when: setup_state == "absent"
