---
# Shared AI agent skills — deployed to ~/.skills/ with per-model symlinks

# ── Command detection ──────────────────────────────────────────────────────────

- name: Check if claude is installed
  command: which claude
  register: skills_claude_check
  failed_when: false
  changed_when: false
  when: setup_state == "present"

- name: Check if qwen is installed
  command: which qwen
  register: skills_qwen_check
  failed_when: false
  changed_when: false
  when: setup_state == "present"

- name: Check if gemini is installed
  command: which gemini
  register: skills_gemini_check
  failed_when: false
  changed_when: false
  when: setup_state == "present"

- name: Check if antigravity is installed
  command: which antigravity
  register: skills_antigravity_check
  failed_when: false
  changed_when: false
  when: setup_state == "present"

# ── Central skills directory ───────────────────────────────────────────────────

- name: Ensure shortcut reference directory exists in ~/.skills/
  file:
    path: "{{ ansible_facts['user_dir'] }}/.skills/shortcut/reference"
    state: directory
    mode: '0700'
  when: setup_state == "present"

# ── Deploy all local skills ────────────────────────────────────────────────────
# Adding a new skill is automatic: drop a directory with SKILL.md under
# roles/skills/files/ and it will be copied on the next playbook run.

- name: Deploy all local skills to central skills directory
  copy:
    src: "{{ role_path }}/files/"
    dest: "{{ ansible_facts['user_dir'] }}/.skills/"
    mode: '0600'
    directory_mode: '0700'
  when: setup_state == "present"

# ── Shortcut OpenAPI spec ──────────────────────────────────────────────────────

- name: Download Shortcut OpenAPI spec to central skills
  get_url:
    url: "https://developer.shortcut.com/api/rest/v3/shortcut.openapi.json"
    dest: "{{ ansible_facts['user_dir'] }}/.skills/shortcut/reference/shortcut.openapi.json"
    mode: '0644'
    timeout: 30
  when: setup_state == "present"

# ── GitHub skill sources ──────────────────────────────────────────────────────

- name: Check if git is available
  command: which git
  register: skills_git_check
  failed_when: false
  changed_when: false
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - github_skill_sources | length > 0

- name: Ensure GitHub skills cache directory exists
  file:
    path: "{{ ansible_facts['user_dir'] }}/.skills/.cache/repos"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - github_skill_sources | length > 0
    - skills_git_check.rc | default(1) == 0

- name: Clone or update GitHub skill repos
  git:
    repo: "{{ item.repo }}"
    dest: >-
      {{ ansible_facts['user_dir'] }}/.skills/.cache/repos/{{
      item.repo
      | regex_replace('^.*github.com[:/]', '')
      | regex_replace('\\.git$', '')
      | regex_replace('/', '__') }}
    version: "{{ item.branch | default('main') }}"
    update: true
    force: true
  loop: "{{ github_skill_sources | default([]) | selectattr('enabled', 'equalto', true) | list }}"
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - skills_git_check.rc | default(1) == 0

- name: Find skill directories in GitHub repos
  find:
    paths: >-
      {{ ansible_facts['user_dir'] }}/.skills/.cache/repos/{{
      item.repo
      | regex_replace('^.*github.com[:/]', '')
      | regex_replace('\\.git$', '')
      | regex_replace('/', '__') }}/{{
      item.skills_path | default('skills') }}
    file_type: directory
    recurse: false
  loop: "{{ github_skill_sources | default([]) | selectattr('enabled', 'equalto', true) | list }}"
  register: skills_github_dirs
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - skills_git_check.rc | default(1) == 0

- name: Sync GitHub skills into ~/.skills/
  copy:
    src: "{{ skill_dir.1.path }}/"
    dest: "{{ ansible_facts['user_dir'] }}/.skills/{{ skill_dir.1.path | basename }}/"
    remote_src: true
  loop: "{{ skills_github_dirs.results | default([]) | selectattr('files', 'defined') | subelements('files') }}"
  loop_control:
    loop_var: skill_dir
  when:
    - setup_state == "present"
    - github_skill_sources is defined
    - skills_git_check.rc | default(1) == 0
    - >-
      (skill_dir.0.item.selected_skills is not defined) or
      (not skill_dir.0.item.selected_skills) or
      ((skill_dir.1.path | basename) in skill_dir.0.item.selected_skills)

# ── Per-model symlinks ─────────────────────────────────────────────────────────

- name: Stat existing skills paths for all models
  stat:
    path: "{{ ansible_facts['user_dir'] }}/{{ item }}/skills"
  register: skills_stat
  loop:
    - .claude
    - .qwen
    - .gemini
    - .gemini/antigravity
  when: setup_state == "present"

- name: Remove skills path if it is not a symlink pointing to ~/.skills
  file:
    path: "{{ ansible_facts['user_dir'] }}/{{ item.item }}/skills"
    state: absent
  loop: "{{ skills_stat.results | default([]) }}"
  when:
    - setup_state == "present"
    - item.stat is defined
    - item.stat.exists
    - not (item.stat.islnk | default(false) and item.stat.lnk_source | default('') == ansible_facts['user_dir'] + '/.skills')

- name: Ensure ~/.claude exists before creating skills symlink
  file:
    path: "{{ ansible_facts['user_dir'] }}/.claude"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - skills_claude_check.rc == 0

- name: Create skills symlink for Claude
  file:
    src: "{{ ansible_facts['user_dir'] }}/.skills"
    dest: "{{ ansible_facts['user_dir'] }}/.claude/skills"
    state: link
  when:
    - setup_state == "present"
    - skills_claude_check.rc == 0

- name: Ensure ~/.qwen exists before creating skills symlink
  file:
    path: "{{ ansible_facts['user_dir'] }}/.qwen"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - skills_qwen_check.rc == 0

- name: Create skills symlink for Qwen
  file:
    src: "{{ ansible_facts['user_dir'] }}/.skills"
    dest: "{{ ansible_facts['user_dir'] }}/.qwen/skills"
    state: link
  when:
    - setup_state == "present"
    - skills_qwen_check.rc == 0

- name: Ensure ~/.gemini exists before creating skills symlink
  file:
    path: "{{ ansible_facts['user_dir'] }}/.gemini"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - skills_gemini_check.rc == 0

- name: Create skills symlink for Gemini
  file:
    src: "{{ ansible_facts['user_dir'] }}/.skills"
    dest: "{{ ansible_facts['user_dir'] }}/.gemini/skills"
    state: link
  when:
    - setup_state == "present"
    - skills_gemini_check.rc == 0

- name: Ensure ~/.gemini/antigravity exists before creating skills symlink
  file:
    path: "{{ ansible_facts['user_dir'] }}/.gemini/antigravity"
    state: directory
    mode: '0700'
  when:
    - setup_state == "present"
    - skills_antigravity_check.rc == 0

- name: Create skills symlink for Antigravity
  file:
    src: "{{ ansible_facts['user_dir'] }}/.skills"
    dest: "{{ ansible_facts['user_dir'] }}/.gemini/antigravity/skills"
    state: link
  when:
    - setup_state == "present"
    - skills_antigravity_check.rc == 0

- name: Find deployed local skills
  find:
    paths: "{{ ansible_facts['user_dir'] }}/.skills/"
    patterns: "SKILL.md"
    recurse: true
  register: skills_deployed
  when: setup_state == "present"

# ── Removal ────────────────────────────────────────────────────────────────────

- name: Remove skills symlinks from model directories
  file:
    path: "{{ ansible_facts['user_dir'] }}/{{ item }}/skills"
    state: absent
  loop:
    - .claude
    - .qwen
    - .gemini
    - .gemini/antigravity
  when: setup_state == "absent"

- name: Remove central skills directory
  file:
    path: "{{ ansible_facts['user_dir'] }}/.skills"
    state: absent
  when: setup_state == "absent"
