---
# Shared AI agent skills — deployed to ~/.skills/ with per-model symlinks

# ── Command detection ──────────────────────────────────────────────────────────

- name: Check if claude is installed
  command: which claude
  register: skills_claude_check
  failed_when: false
  changed_when: false
  when: setup_state == "present"

- name: Check if qwen is installed
  command: which qwen
  register: skills_qwen_check
  failed_when: false
  changed_when: false
  when: setup_state == "present"

- name: Check if gemini is installed
  command: which gemini
  register: skills_gemini_check
  failed_when: false
  changed_when: false
  when: setup_state == "present"

- name: Check if antigravity is installed
  command: which antigravity
  register: skills_antigravity_check
  failed_when: false
  changed_when: false
  when: setup_state == "present"

# ── Central skills directory ───────────────────────────────────────────────────

- name: Ensure central ~/.skills directory structure exists
  file:
    path: "{{ ansible_facts['user_dir'] }}/.skills/{{ item }}"
    state: directory
    mode: '0700'
  loop:
    - shortcut/reference
    - shortcut-to-vibe
    - github-issue-to-vibe
    - git-commit
    - run-quality-checks
    - threat-model
    - api-review
    - test-plan
    - git-branch
    - adr
    - release-notes
    - db-migration-review
    - incident
    - dependency-review
    - spike
  when: setup_state == "present"

# ── Shortcut skill ─────────────────────────────────────────────────────────────

- name: Deploy Shortcut SKILL.md to central skills
  copy:
    src: "shortcut/SKILL.md"
    dest: "{{ ansible_facts['user_dir'] }}/.skills/shortcut/SKILL.md"
    mode: '0600'
  when: setup_state == "present"

- name: Download Shortcut OpenAPI spec to central skills
  get_url:
    url: "https://developer.shortcut.com/api/rest/v3/shortcut.openapi.json"
    dest: "{{ ansible_facts['user_dir'] }}/.skills/shortcut/reference/shortcut.openapi.json"
    mode: '0644'
    timeout: 30
  when: setup_state == "present"

