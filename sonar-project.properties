# SonarQube Configuration for AI Agent Workforce

# Project identification (SonarCloud)
sonar.organization=muhamadto
sonar.projectKey=muhamadto_ai-agent-workforce
sonar.projectName=ai-agent-workforce
sonar.projectVersion=1.0
sonar.host.url=https://sonarcloud.io

# Source code location - Ansible YAML files
sonar.sources=roles,playbook.yml,inventory.ini,ansible.cfg
sonar.sourceEncoding=UTF-8

# Include YAML files
sonar.inclusions=**/*.yml,**/*.yaml

# Exclude patterns
sonar.exclusions=\
  **/node_modules/**,\
  **/.git/**,\
  **/target/**,\
  **/build/**

# Additional analysis parameters
sonar.qualitygate.wait=false
