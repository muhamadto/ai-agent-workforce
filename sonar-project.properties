# SonarQube Configuration for ESP32 Firmware Project

# Project identification (SonarCloud)
sonar.organization=muhamadto
sonar.projectKey=muhamadto_ai-agent-workforce
sonar.projectName=ai-agent-workforce
sonar.projectVersion=1.0
sonar.host.url=https://sonarcloud.io

# Source code location
sonar.sources=main,components
sonar.sourceEncoding=UTF-8

# C/C++ specific settings
## Using build-wrapper mode via CI args; do not set compile-commands here
## Let analyzer auto-detect threads

# Exclude patterns
sonar.exclusions=\
  **/build/**,\
  **/test/**,\
  **/*.bin,\
  **/*.elf,\
  **/*.map

# Test coverage (if using gcov/lcov)
# sonar.cfamily.gcov.reportsPath=coverage

# Additional analysis parameters
sonar.cfamily.cache.enabled=true
sonar.cfamily.cache.path=.sonar/cfamily-cache
